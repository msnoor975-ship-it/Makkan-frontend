# fly.toml app configuration file generated for makkan-frontend on 2026-07-02T15:24:34+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'makkan-frontend'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  VITE_API_URL = 'https://makkan-backend.onrender.com'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '10s'
    grace_period = '5s'
    method = 'GET'
    path = '/'
    protocol = 'tcp'
    port = 80

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
